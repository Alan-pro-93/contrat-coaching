<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lien Client Généré</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 45px 50px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 90%;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1a1a2e;
            letter-spacing: 1px;
        }
        .card p {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }
        .link-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            word-break: break-all;
            font-size: 13px;
            font-family: monospace;
            color: #1a1a2e;
            margin-bottom: 20px;
            text-align: left;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            transition: background 0.2s;
            text-decoration: none;
            margin: 5px;
        }
        .btn:hover { background: #0f3460; }
        .btn-secondary {
            background: white;
            color: #1a1a2e;
            border: 2px solid #1a1a2e;
        }
        .btn-secondary:hover { background: #f0f0f0; }
        .copied {
            color: #27ae60;
            font-size: 13px;
            font-family: Arial, sans-serif;
            margin-top: 10px;
            display: none;
        }
        .check-icon {
            font-size: 50px;
            color: #27ae60;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">&#10003;</div>
        <h2>LIEN CLIENT GÉNÉRÉ</h2>
        <p>Partagez ce lien avec votre client pour qu'il puisse remplir ses informations et signer le contrat.</p>
        <div class="link-box" id="link-text">{{ client_url }}</div>
        <div>
            <button class="btn" onclick="copyLink()">COPIER LE LIEN</button>
        </div>
        <p class="copied" id="copied-msg">Lien copié dans le presse-papiers !</p>
        <div style="margin-top: 25px;">
            <a href="/nouveau" class="btn btn-secondary">Nouveau contrat</a>
            <a href="/mes-contrats" class="btn btn-secondary">Mes contrats</a>
        </div>
    </div>

<script>
    function copyLink() {
        var text = document.getElementById('link-text').textContent;
        navigator.clipboard.writeText(text).then(function() {
            document.getElementById('copied-msg').style.display = 'block';
            setTimeout(function() {
                document.getElementById('copied-msg').style.display = 'none';
            }, 3000);
        });
    }
</script>
</body>
</html>
