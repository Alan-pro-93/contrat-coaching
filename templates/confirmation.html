<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrat Signe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 45px 50px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        .check-icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 15px;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1a1a2e;
            letter-spacing: 1px;
        }
        .card p {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
            font-family: Arial, sans-serif;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn:hover { background: #0f3460; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">&#10003;</div>
        {% if already_signed %}
        <h2>CONTRAT DEJA SIGNE</h2>
        <p>Ce contrat a deja ete signe. Vous pouvez telecharger le PDF ci-dessous.</p>
        {% else %}
        <h2>CONTRAT SIGNE AVEC SUCCES</h2>
        <p>Votre contrat a ete signe avec succes. Vous pouvez telecharger le PDF ci-dessous.</p>
        {% endif %}
        <a href="/telecharger/{{ contrat_id }}" class="btn">TELECHARGER LE PDF</a>
    </div>
</body>
</html>
